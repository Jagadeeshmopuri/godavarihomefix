<!DOCTYPE html>
<html>
<head>
  <title>Godavari All In All</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="hero">
  <h1>Godavari All In All</h1>
  <p>All Home Services at Your Doorstep</p>
  <button class="cta" onclick="bookService('General Service')">
    Book Service Now
  </button>
</header>

<section class="services">

  <div class="card">
    <h3>
      <img src="https://img.icons8.com/color/48/plumbing.png" class="icon">
      Plumbing
    </h3>
    <button onclick="bookService('Plumbing')">Book Service</button>
  </div>

  <div class="card">
    <h3>
      <img src="https://img.icons8.com/color/48/electrical.png" class="icon">
      Electrical
    </h3>
    <button onclick="bookService('Electrical')">Book Service</button>
  </div>

  <div class="card">
    <h3>
<img src="https://img.icons8.com/color/48/cleaning.png" class="icon">
      Maid Service
    </h3>
    <button onclick="bookService('Maid Service')">Book Service</button>
  </div>

  <div class="card">
    <h3>
      <img src="https://img.icons8.com/color/48/maintenance.png" class="icon">
      Appliance Repair
    </h3>
    <button onclick="bookService('Appliance Repair')">Book Service</button>
  </div>

</section>

<section class="why">
  <h2>Why Choose Us?</h2>
  <ul>
    <li>✔ Verified Local Professionals</li>
    <li>✔ Fast Service</li>
    <li>✔ Affordable Pricing</li>
  </ul>
</section>

<footer>
  <p>© 2026 Godavari All In All</p>
</footer>

<script src="app.js"></script>

</body>
</html>
